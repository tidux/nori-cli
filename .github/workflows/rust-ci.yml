name: rust-ci
on:
  pull_request: {}
  push:
    branches: [main, dev]

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_INCREMENTAL: "0"

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: Linux checks
          - runner: macos-14
            target: aarch64-apple-darwin
            name: macOS checks

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.90
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Compute lockfile hash
        id: lockhash
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          echo "hash=$(sha256sum Cargo.lock | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$(sha256sum rust-toolchain.toml | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      # Cache cargo home directory (registry, git deps, etc.)
      - name: Restore cargo home cache
        id: cache_cargo_home_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.profile }}-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
          restore-keys: |
            cargo-home-${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.profile }}-

      # CI checks
      - name: cargo check
        run: cargo check --target ${{ matrix.target }} --all-features

      - name: cargo fmt
        run: cargo +nightly fmt -- --check

      - name: cargo clippy
        run: cargo clippy --target ${{ matrix.target }} --all-features -- -D warnings

      - name: cargo test
        continue-on-error: true  # TODO: Fix pre-existing test failures in codex-app-server
        run: cargo test --target ${{ matrix.target }} --all-features

      # Save cargo home cache
      - name: Save cargo home cache
        if: always() && !cancelled()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.profile }}-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
